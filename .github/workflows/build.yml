name: Build Stream Deck Plugins

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install global dependencies
      run: npm install -g @elgato/cli rollup

    - name: Install plugin dependencies (all plugins)
      run: |
        set -e
        for d in */; do
          basename=${d%/}
          if [[ "$basename" == *plugin ]]; then
            echo "Installing in $basename"
            (cd "$basename" && npm install)
          fi
        done
      shell: bash

    - name: Build and package all plugins
      run: npm run dist

    - name: Upload built artifacts
      uses: actions/upload-artifact@v4
      with:
        name: streamdeck-plugins
        path: |
          sdplugins/**
          *.streamDeckPlugin
          **/*.streamDeckPlugin
        if-no-files-found: error
